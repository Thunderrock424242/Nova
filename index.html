<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Assistant</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="card">
        <header>
          <h1 id="greeting">Greetings, friend.</h1>
          <p class="tagline">Nova — local-first AI companion powered by Ollama.</p>
        </header>

        <section class="settings">
          <label for="nameInput">Your name</label>
          <div class="row">
            <input id="nameInput" type="text" placeholder="Enter your name" />
            <button id="saveNameBtn">Save</button>
          </div>

          <label for="modelInput">Ollama model</label>
          <div class="row">
            <input id="modelInput" type="text" placeholder="llama3.1:8b" />
            <button id="saveModelBtn">Save Model</button>
          </div>

          <div class="row wrap">
            <button id="startOllamaBtn" class="secondary">Start Ollama (PowerShell)</button>
            <button id="stopOllamaBtn" class="secondary">Stop Ollama</button>
            <button id="clearBtn" class="secondary">Clear Chat</button>
          </div>
          <p id="statusText" class="status">Status: Unknown</p>
        </section>

        <nav class="tabs">
          <button class="tab active" data-tab="chatTab">Chat</button>
          <button class="tab" data-tab="statusTab">Status</button>
          <button class="tab" data-tab="teachingTab">Teaching</button>
        </nav>

        <section id="chatTab" class="tab-panel active">
          <section id="chat" class="chat" aria-live="polite"></section>
          <form id="chatForm" class="row">
            <input id="messageInput" type="text" placeholder="Talk to Nova..." autocomplete="off" required />
            <button type="submit">Send</button>
          </form>
        </section>

        <section id="statusTab" class="tab-panel">
          <div id="statusPanel" class="panel"></div>
        </section>

        <section id="teachingTab" class="tab-panel">
          <p class="tagline">Teach Nova by sharing preferred behavior, facts, and workflow notes. Stored locally and injected into prompts.</p>
          <textarea id="teachingNotes" rows="6" placeholder="Example: When helping me with NeoForge mods, prefer Gradle tasks and Java snippets."></textarea>
          <div class="row">
            <button id="saveTeachingBtn" type="button">Save Teaching Notes</button>
          </div>
          <section id="teachingChat" class="chat"></section>
          <form id="teachingForm" class="row">
            <input id="teachingInput" type="text" placeholder="Teach Nova something..." autocomplete="off" required />
            <button type="submit">Teach</button>
          </form>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
